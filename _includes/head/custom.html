<!-- Professional visual enhancements -->
<style>

/* =====================================================
   TYPOGRAPHY — Inter font
   ===================================================== */
body,
.page__content,
.author__content,
.masthead,
.page__footer {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* =====================================================
   SMOOTH SCROLL
   ===================================================== */
html { scroll-behavior: smooth; }

/* =====================================================
   PAGE LOAD ANIMATIONS
   ===================================================== */
@keyframes jl-fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes jl-fadeInLeft {
  from { opacity: 0; transform: translateX(-18px); }
  to   { opacity: 1; transform: translateX(0); }
}

.page__content {
  animation: jl-fadeInUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.author__avatar {
  animation: jl-fadeInLeft 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.author__content {
  animation: jl-fadeInLeft 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both;
}
.author__urls-wrapper {
  animation: jl-fadeInLeft 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.16s both;
}

/* =====================================================
   SCROLL REVEAL
   ===================================================== */
.js-reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.65s cubic-bezier(0.22, 1, 0.36, 1),
              transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
}
.js-reveal.is-visible {
  opacity: 1;
  transform: none;
}

/* =====================================================
   MASTHEAD — dark navy gradient
   ===================================================== */
.masthead {
  background: linear-gradient(135deg, #1e2d3d 0%, #2c3e50 100%) !important;
  border-bottom: 2px solid #52adc8 !important;
  box-shadow: 0 2px 16px rgba(0, 0, 0, 0.28) !important;
}
.masthead a,
.greedy-nav a,
.masthead__menu-item a {
  color: #ecf0f1 !important;
  transition: color 0.25s ease !important;
}
.masthead a:hover,
.greedy-nav a:hover,
.masthead__menu-item a:hover {
  color: #52adc8 !important;
}
/* Mobile hamburger icon */
.greedy-nav .navicon,
.greedy-nav .navicon::before,
.greedy-nav .navicon::after {
  background: #ecf0f1 !important;
}
/* Mobile overflow dropdown */
.greedy-nav .hidden-links {
  background: #1e2d3d !important;
  border: 1px solid #2c3e50 !important;
}
.greedy-nav .hidden-links a {
  color: #ecf0f1 !important;
}
.greedy-nav .hidden-links a:hover {
  color: #52adc8 !important;
  background: rgba(255,255,255,0.06) !important;
}

/* =====================================================
   PROFILE PHOTO
   ===================================================== */
.author__avatar img {
  border: 3px solid #52adc8 !important;
  box-shadow: 0 4px 16px rgba(82, 173, 200, 0.28);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.author__avatar img:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 24px rgba(82, 173, 200, 0.52);
}

/* =====================================================
   AUTHOR NAME — gradient text
   ===================================================== */
.author__name {
  background: linear-gradient(135deg, #2c3e50, #52adc8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700 !important;
}

/* =====================================================
   SIDEBAR SOCIAL LINKS
   ===================================================== */
.author__urls a {
  transition: color 0.2s ease, transform 0.2s ease;
  display: inline-block;
}
.author__urls a:hover {
  color: #52adc8 !important;
  transform: translateX(4px);
}
.author__bio {
  font-size: 0.88em;
  line-height: 1.55;
}

/* =====================================================
   SECTION HEADINGS
   ===================================================== */
.page__content h2 {
  border-left: 4px solid #52adc8;
  padding-left: 0.55em;
  margin-top: 2em;
  position: relative;
}
.page__content h2::after {
  content: '';
  display: block;
  height: 1px;
  margin-top: 0.35em;
  background: linear-gradient(90deg, rgba(82, 173, 200, 0.4), transparent);
}

/* =====================================================
   LIST ITEMS
   ===================================================== */
.page__content ul li,
.page__content ol li {
  margin-bottom: 0.35em;
}

/* =====================================================
   ARCHIVE ITEMS — hover cards
   ===================================================== */
.archive__item {
  padding: 0.85em 1em;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: background 0.22s ease, box-shadow 0.22s ease,
              transform 0.22s ease, border-color 0.22s ease;
}
.archive__item:hover {
  background: #f4fafd;
  border-color: #c5e8f3;
  box-shadow: 0 4px 14px rgba(82, 173, 200, 0.15);
  transform: translateY(-2px);
}
.archive__item-title a {
  text-decoration: none;
  transition: color 0.2s ease;
}
.archive__item-title a:hover {
  color: #52adc8;
}

/* =====================================================
   ANIMATED UNDERLINE ON CONTENT LINKS
   ===================================================== */
.page__content a:not(.btn) {
  text-decoration: none;
  background-image: linear-gradient(#52adc8, #52adc8);
  background-repeat: no-repeat;
  background-size: 0% 1.5px;
  background-position: left 100%;
  padding-bottom: 1px;
  transition: background-size 0.3s ease, color 0.3s ease;
}
.page__content a:not(.btn):hover {
  background-size: 100% 1.5px;
  color: #52adc8;
}

/* =====================================================
   BUTTONS
   ===================================================== */
.btn {
  border-radius: 5px;
  letter-spacing: 0.02em;
  transition: transform 0.22s ease, box-shadow 0.22s ease !important;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 14px rgba(0, 0, 0, 0.18) !important;
}
.btn--info {
  background: linear-gradient(135deg, #52adc8, #2980b9) !important;
  border-color: transparent !important;
}
.btn--info:hover {
  background: linear-gradient(135deg, #3d9db8, #1a6ea0) !important;
}

/* =====================================================
   FOOTER — matches masthead
   ===================================================== */
.page__footer {
  background: linear-gradient(135deg, #1e2d3d 0%, #2c3e50 100%) !important;
  color: #aab8c2 !important;
  border-top: 2px solid #52adc8 !important;
}
.page__footer a {
  color: #52adc8 !important;
  transition: color 0.2s ease;
}
.page__footer a:hover {
  color: #7fcee0 !important;
}

/* =====================================================
   PAGE TITLE
   ===================================================== */
.page__title {
  font-weight: 700;
  letter-spacing: -0.02em;
}

</style>

<!-- Scroll-reveal: elements fade up as they enter the viewport -->
<script>
(function () {
  'use strict';
  document.addEventListener('DOMContentLoaded', function () {
    var selectors = [
      '.page__content > p',
      '.page__content > ul',
      '.page__content > ol',
      '.page__content > h2',
      '.page__content > h3',
      '.page__content > blockquote',
      '.page__content > hr',
      '.page__content > .notice',
      '.archive__item'
    ].join(', ');

    var elements = document.querySelectorAll(selectors);

    elements.forEach(function (el, i) {
      el.classList.add('js-reveal');
      el.style.transitionDelay = Math.min(i * 0.06, 0.3) + 's';
    });

    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -20px 0px' });

      document.querySelectorAll('.js-reveal').forEach(function (el) {
        observer.observe(el);
      });
    } else {
      document.querySelectorAll('.js-reveal').forEach(function (el) {
        el.classList.add('is-visible');
      });
    }
  });
}());
</script>
